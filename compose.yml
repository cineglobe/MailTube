name: mailtube

services:
  mailtube:
    image: ${MAILTUBE_IMAGE:-ghcr.io/OWNER/MailTube:latest}
    build:
      context: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "${MAILTUBE_BIND_ADDRESS:-127.0.0.1}:${MAILTUBE_HTTP_PORT:-8080}:8080"
    volumes:
      - mailtube-data:/data
      - mailtube-work:/work
      - ${MAILTUBE_COOKIES_SOURCE:-./docker/empty-cookies.txt}:/run/secrets/youtube-cookies.txt:ro
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/v1/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      pot-provider:
        condition: service_started
        required: false

  pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:1.3.1-deno
    profiles: ["pot-provider"]
    restart: unless-stopped
    expose:
      - "4416"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    profiles: ["minio"]
    command: server /data --console-address :9001
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mailtube}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-}
    volumes:
      - minio-data:/data
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    security_opt:
      - no-new-privileges:true

volumes:
  mailtube-data:
  mailtube-work:
  minio-data:
