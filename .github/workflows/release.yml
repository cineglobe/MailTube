name: Release image
on:
  push:
    tags: ["v*.*.*"]
permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: "${{ steps.meta.outputs.tags }}"
          labels: "${{ steps.meta.outputs.labels }}"
          provenance: mode=max
          sbom: true
          build-args: |
            SOURCE_URL=${{ github.server_url }}/${{ github.repository }}
            VERSION=${{ github.ref_name }}
      - uses: sigstore/cosign-installer@v4
      - run: cosign sign --yes "ghcr.io/${GITHUB_REPOSITORY,,}@${{ steps.build.outputs.digest }}"
      - uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: "${{ steps.build.outputs.digest }}"
          push-to-registry: true
      - run: |
          sed "s|ghcr.io/OWNER/MailTube|ghcr.io/${GITHUB_REPOSITORY,,}|g" scripts/install.sh > install.sh
          sed "s|ghcr.io/OWNER/MailTube|ghcr.io/${GITHUB_REPOSITORY,,}|g" scripts/install.ps1 > install.ps1
          printf '{"version":"%s","image":"ghcr.io/%s","digest":"%s"}\n' \
            "${GITHUB_REF_NAME#v}" "${GITHUB_REPOSITORY,,}" "${{ steps.build.outputs.digest }}" > stable-manifest.json
          sha256sum stable-manifest.json install.sh install.ps1 > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            stable-manifest.json
            SHA256SUMS
            install.sh
            install.ps1
