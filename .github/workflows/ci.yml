name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install --constraint constraints.txt -e '.[dev]'
      - run: ruff format --check .
      - run: ruff check .
      - run: mypy src
      - run: pytest --junitxml=test-results/backend.xml
      - run: pip check
      - run: '! git ls-files | grep -q "^my_version/"'
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: backend-test-results, path: test-results }
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.4.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm, cache-dependency-path: apps/web/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e --project=desktop
      - run: pnpm audit --prod --audit-level high
  container:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: mailtube:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify generated secrets are readable by the non-root container
        run: |
          config_dir=$(mktemp -d)
          setup_file=$(mktemp)
          cat > "$setup_file" <<'JSON'
          {
            "bind_mode": "localhost",
            "public_url": "http://127.0.0.1:8080",
            "allowed_hosts": ["localhost", "127.0.0.1"],
            "admin_password": "correct horse battery",
            "delivery_mode": "attachments",
            "storage_preset": "local"
          }
          JSON
          chmod 600 "$setup_file"
          docker run --rm -i --user "$(id -u):$(id -g)" \
            -e MAILTUBE_CONFIG_DIR=/config \
            -e MAILTUBE_IMAGE=mailtube:test \
            -v "$config_dir:/config" \
            mailtube:test mailtube setup --non-interactive - < "$setup_file"
          docker compose --env-file "$config_dir/.env" -f "$config_dir/compose.yml" config >/dev/null
          docker compose --env-file "$config_dir/.env" -f "$config_dir/compose.yml" run --rm --no-deps secrets-init
          docker compose --env-file "$config_dir/.env" -f "$config_dir/compose.yml" run --rm --no-deps \
            --entrypoint /bin/sh mailtube -ec \
            'test -r /run/secrets/admin_password_hash -a -r /run/secrets/session_secret'
          docker compose --env-file "$config_dir/.env" -f "$config_dir/compose.yml" down -v
      - run: |
          docker run -d --name mailtube-ci -p 127.0.0.1:8080:8080 \
            -e MAILTUBE_ENVIRONMENT=test mailtube:test
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8080/api/v1/health && exit 0
            sleep 2
          done
          docker logs mailtube-ci
          exit 1
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: mailtube:test
          severity: CRITICAL,HIGH
          exit-code: "1"
