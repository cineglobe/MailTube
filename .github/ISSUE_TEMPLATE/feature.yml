name: Feature request
description: Propose a scoped improvement
body:
  - type: textarea
    id: problem
    attributes: { label: Problem to solve }
    validations: { required: true }
  - type: textarea
    id: proposal
    attributes: { label: Proposed behavior and alternatives }
    validations: { required: true }
  - type: textarea
    id: impact
    attributes: { label: Security, privacy, and resource impact }
