version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule: { interval: weekly }
    groups:
      python-runtime: { patterns: ["*"] }
  - package-ecosystem: npm
    directory: /apps/web
    schedule: { interval: weekly }
    groups:
      web-runtime: { patterns: ["*"] }
  - package-ecosystem: docker
    directory: /
    schedule: { interval: weekly }
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }
